<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>카카오맵 장소 검색 서비스</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* 전체 화면 2분할 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 영역 */
        .sidebar {
            width: 350px;
            background-color: #ffffff;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
        }

        /* 검색창 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-box button {
            padding: 10px 16px;
            border: none;
            background-color: #fee500;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-box button:hover {
            background-color: #f7d900;
        }

        /* 검색 결과 리스트 */
        .result-list {
            list-style: none;
        }

        .result-item {
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .result-item:hover {
            background-color: #f5f5f5;
        }

        .place-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .place-address {
            font-size: 13px;
            color: #666;
        }

        /* 오른쪽 지도 영역 */
        .map-area {
            flex: 1;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- 왼쪽 검색 영역 -->
        <div class="sidebar">

            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 검색하세요" />
                <button id="searchButton">검색</button>
            </div>

            <ul class="result-list" id="resultList"></ul>

        </div>

        <!-- 오른쪽 지도 영역 -->
        <div class="map-area">
            <div id="map"></div>
        </div>

    </div>

    <!-- 카카오맵 SDK -->
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=70a1bb5c7d8e1e60565bfc6a59b8266f&libraries=services&autoload=false"></script>

    <script>
        // 지도 객체 저장 변수
        let map;

        // 마커 배열
        let markers = [];

        // 장소 검색 객체
        let placesService;

        // 지도 로딩 완료 후 실행
        kakao.maps.load(function () {

            // 현재 위치 가져오기
            if (navigator.geolocation) {

                navigator.geolocation.getCurrentPosition(
                    function (position) {

                        const latitude = position.coords.latitude;
                        const longitude = position.coords.longitude;

                        createMap(latitude, longitude);

                    },

                    function () {

                        // 위치 권한 거부 시 기본 위치 (서울시청)
                        alert("위치 권한이 거부되어 기본 위치로 이동합니다.");

                        createMap(37.5665, 126.9780);
                    }
                );

            } else {

                // 브라우저에서 위치 기능 미지원
                alert("현재 브라우저에서는 위치 기능을 지원하지 않습니다.");

                createMap(37.5665, 126.9780);
            }

        });

        // 지도 생성 함수
        function createMap(latitude, longitude) {

            const mapContainer = document.getElementById("map");

            const mapOption = {
                center: new kakao.maps.LatLng(latitude, longitude),
                level: 5
            };

            // 지도 생성
            map = new kakao.maps.Map(mapContainer, mapOption);

            // 현재 위치 마커 생성
            const currentMarker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(latitude, longitude)
            });

            currentMarker.setMap(map);

            // 장소 검색 서비스 생성
            placesService = new kakao.maps.services.Places();

            // 검색 버튼 이벤트
            document
                .getElementById("searchButton")
                .addEventListener("click", searchPlace);

            // 엔터키 검색
            document
                .getElementById("keyword")
                .addEventListener("keydown", function (event) {

                    if (event.key === "Enter") {
                        searchPlace();
                    }

                });
        }

        // 장소 검색 함수
        function searchPlace() {

            const keyword = document
                .getElementById("keyword")
                .value
                .trim();

            if (!keyword) {
                alert("검색어를 입력해주세요.");
                return;
            }

            // 키워드 검색 실행
            placesService.keywordSearch(keyword, placesSearchCallback);
        }

        // 검색 결과 처리 함수
        function placesSearchCallback(data, status) {

            if (status === kakao.maps.services.Status.OK) {

                displayPlaces(data);

            } else {

                alert("검색 결과가 없습니다.");
            }
        }

        // 검색 결과 출력 함수
        function displayPlaces(places) {

            const resultList = document.getElementById("resultList");

            resultList.innerHTML = "";

            // 기존 마커 제거
            removeMarkers();

            const bounds = new kakao.maps.LatLngBounds();

            places.forEach(function (place) {

                const position = new kakao.maps.LatLng(place.y, place.x);

                // 마커 생성
                const marker = new kakao.maps.Marker({
                    map: map,
                    position: position
                });

                markers.push(marker);

                // 지도 범위 확장
                bounds.extend(position);

                // 리스트 아이템 생성
                const item = document.createElement("li");

                item.className = "result-item";

                item.innerHTML = `
                    <div class="place-name">${place.place_name}</div>
                    <div class="place-address">${place.address_name || "주소 정보 없음"}</div>
                `;

                // 클릭 시 지도 이동
                item.addEventListener("click", function () {

                    map.setCenter(position);
                    map.setLevel(3);

                });

                resultList.appendChild(item);

            });

            // 검색 결과가 모두 보이도록 지도 범위 조정
            map.setBounds(bounds);
        }

        // 기존 마커 삭제 함수
        function removeMarkers() {

            markers.forEach(function (marker) {
                marker.setMap(null);
            });

            markers = [];
        }
    </script>

</body>
</html>
