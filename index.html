<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 영화 특별관 찾기</title>

    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: "Malgun Gothic", sans-serif;
        }

        /* 전체 화면 2분할 */
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 */
        #sidebar {
            width: 360px;
            height: 100%;
            background-color: #f8f9fa;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            z-index: 10;
        }

        /* 오른쪽 지도 */
        #map {
            flex: 1;
            height: 100%;
        }

        /* 제목 */
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* 검색창 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .search-box button {
            padding: 10px 14px;
            border: none;
            background-color: #fee500;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 탭 영역 */
        .tab-container {
            margin-bottom: 20px;
        }

        .tab-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #222;
            color: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }

        .tab-button:hover {
            background-color: #444;
        }

        /* 결과 리스트 */
        #places-list {
            list-style: none;
        }

        #places-list li {
            padding: 15px 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: 0.2s;
        }

        #places-list li:hover {
            background-color: #f0f0f0;
        }

        #places-list h5 {
            margin-bottom: 5px;
            color: #222;
        }

        #places-list p {
            font-size: 13px;
            color: #666;
        }

        .category-label {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 8px;
            border-radius: 12px;
            background-color: #111;
            color: white;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- 왼쪽 영역 -->
    <div id="sidebar">

        <div class="title">🎬 영화 특별관 찾기</div>

        <!-- 검색창 -->
        <div class="search-box">
            <input
                type="text"
                id="keyword"
                placeholder="지역 또는 영화관 입력"
                onkeypress="if(event.keyCode === 13) searchPlaces()"
            >
            <button onclick="searchPlaces()">검색</button>
        </div>

        <!-- 탭 -->
        <div class="tab-container">
            <button class="tab-button" onclick="searchIMAX()">
                IMAX 특별관 보기
            </button>
        </div>

        <!-- 결과 리스트 -->
        <ul id="places-list"></ul>

    </div>

    <!-- 오른쪽 지도 -->
    <div id="map"></div>

</div>

<!-- 카카오맵 SDK -->
<script
    type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=70a1bb5c7d8e1e60565bfc6a59b8266f&autoload=false&libraries=services"
></script>

<script>

    let map;
    let placeService;

    let currentPosition = null;

    let markerList = [];

    // IMAX 마커 이미지
    const imaxMarkerImage = new kakao.maps.MarkerImage(
        "IMAX.logo.png",
        new kakao.maps.Size(45, 45),
        {
            offset: new kakao.maps.Point(22, 45)
        }
    );

    // 현재 위치 마커 이미지
    const currentMarkerImage = new kakao.maps.MarkerImage(
        "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png",
        new kakao.maps.Size(24, 35)
    );

    // 카카오맵 SDK 로드 완료 후 실행
    kakao.maps.load(function () {

        // 현재 위치 가져오기
        if (navigator.geolocation) {

            navigator.geolocation.getCurrentPosition(

                function (position) {

                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;

                    currentPosition = new kakao.maps.LatLng(latitude, longitude);

                    initializeMap(latitude, longitude);

                },

                function (error) {

                    console.error("위치 정보를 가져올 수 없습니다.", error);

                    // 기본 위치 (서울 시청)
                    initializeMap(37.566826, 126.9786567);
                }

            );

        } else {

            // 브라우저가 Geolocation 미지원 시
            initializeMap(37.566826, 126.9786567);

        }

    });

    // 지도 초기화 함수
    function initializeMap(latitude, longitude) {

        const mapContainer = document.getElementById("map");

        const mapOption = {
            center: new kakao.maps.LatLng(latitude, longitude),
            level: 5
        };

        // 지도 생성
        map = new kakao.maps.Map(mapContainer, mapOption);

        // 장소 검색 객체 생성
        placeService = new kakao.maps.services.Places();

        // 현재 위치 마커 표시
        displayCurrentLocation(latitude, longitude);
    }

    // 현재 위치 표시 함수
    function displayCurrentLocation(latitude, longitude) {

        const currentLocation = new kakao.maps.LatLng(latitude, longitude);

        const currentMarker = new kakao.maps.Marker({
            map: map,
            position: currentLocation,
            image: currentMarkerImage
        });

        const infoWindow = new kakao.maps.InfoWindow({
            content: `
                <div style="
                    padding:8px;
                    font-size:13px;
                    text-align:center;
                ">
                    📍 현재 위치
                </div>
            `
        });

        infoWindow.open(map, currentMarker);
    }

    // 일반 검색 함수
    function searchPlaces() {

        const keyword = document.getElementById("keyword").value.trim();

        if (!keyword) {
            alert("검색어를 입력해주세요!");
            return;
        }

        // 기존 마커 제거
        removeMarkers();

        // 키워드 검색
        placeService.keywordSearch(keyword, placesSearchCallback);
    }

    // IMAX 탭 검색 함수
    function searchIMAX() {

        // 기존 마커 제거
        removeMarkers();

        // 리스트 초기화
        document.getElementById("places-list").innerHTML = "";

        // 현재 지도 중심 기준 검색
        const center = map.getCenter();

        // CT1 + IMAX 검색
        placeService.keywordSearch(
            "IMAX 영화관",
            placesSearchCallback,
            {
                location: center
            }
        );
    }

    // 검색 결과 콜백 함수
    function placesSearchCallback(data, status) {

        if (status === kakao.maps.services.Status.OK) {

            displayPlaces(data);

        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {

            alert("검색 결과가 없습니다.");

        } else if (status === kakao.maps.services.Status.ERROR) {

            alert("검색 중 오류가 발생했습니다.");

        }
    }

    // 검색 결과 표시 함수
    function displayPlaces(places) {

        const listElement = document.getElementById("places-list");

        listElement.innerHTML = "";

        const bounds = new kakao.maps.LatLngBounds();

        for (let i = 0; i < places.length; i++) {

            const place = places[i];

            const position = new kakao.maps.LatLng(place.y, place.x);

            // IMAX 마커 생성
            const marker = new kakao.maps.Marker({
                map: map,
                position: position,
                title: place.place_name,
                image: imaxMarkerImage
            });

            markerList.push(marker);

            bounds.extend(position);

            // 리스트 아이템 생성
            const item = document.createElement("li");

            item.innerHTML = `
                <h5>${place.place_name}</h5>
                <p>${place.address_name}</p>
                <span class="category-label">IMAX</span>
            `;

            // 리스트 클릭 시 지도 이동
            item.onclick = function () {

                map.panTo(position);

                map.setLevel(3);

            };

            listElement.appendChild(item);
        }

        // 지도 범위 재설정
        map.setBounds(bounds);
    }

    // 마커 제거 함수
    function removeMarkers() {

        for (let i = 0; i < markerList.length; i++) {

            markerList[i].setMap(null);

        }

        markerList = [];
    }

</script>

</body>
</html>
